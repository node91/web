<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nodes Background</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #05060a;
      --node: rgba(255, 255, 255, 0.35);
      --node-soft: rgba(255, 255, 255, 0.08);
      --accent: #7b5cff;
      --text: #f5f5f7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #151827 0, #05060a 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: min(960px, 90vw);
      height: min(540px, 60vh);
      border-radius: 32px;
      padding: 32px;
      background: radial-gradient(circle at 20% 0%, #262a3f 0, #05060a 55%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    /* Nodes layer */
    .nodes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    .node {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--node);
      box-shadow:
        0 0 0 6px var(--node-soft),
        0 0 18px rgba(255, 255, 255, 0.4);
    }

    .node::after {
      content: "";
      position: absolute;
      inset: -24px;
      border-radius: inherit;
      background: radial-gradient(circle, var(--accent) 0, transparent 60%);
      opacity: 0.18;
      filter: blur(10px);
    }

    .link {
      position: absolute;
      height: 1px;
      background: linear-gradient(
        to right,
        rgba(255, 255, 255, 0.05),
        rgba(255, 255, 255, 0.35),
        rgba(255, 255, 255, 0.05)
      );
      transform-origin: left center;
      opacity: 0.7;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 420px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245, 245, 247, 0.8);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(123, 92, 255, 0.9);
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(245, 245, 247, 0.75);
    }

    .cta-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-primary {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: radial-gradient(circle at 0 0, #f5f5ff 0, #7b5cff 40%, #3b2bff 100%);
      color: #05060a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        0 12px 32px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .btn-ghost {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(5, 6, 10, 0.7);
      color: rgba(245, 245, 247, 0.9);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .scene {
        height: auto;
        min-height: 420px;
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="nodes" id="nodes-layer"></div>

    <div class="content">
      <div class="pill">
        <span class="pill-dot"></span>
        NODES BACKGROUND
      </div>
      <h1>Static page with a performative nodes field.</h1>
      <p>
        This canvas of softly glowing nodes and links is ready for you to drop in
        your own UI, copy, or layout.
      </p>
      <div class="cta-row">
        <button class="btn-primary">Primary action</button>
        <button class="btn-ghost">Secondary</button>
      </div>
    </div>
  </div>

  <script>
    // Simple node + link layout (static, no animation)
    const layer = document.getElementById("nodes-layer");

    const nodes = [
      { x: 12, y: 18 },
      { x: 32, y: 42 },
      { x: 18, y: 70 },
      { x: 52, y: 24 },
      { x: 68, y: 48 },
      { x: 78, y: 20 },
      { x: 82, y: 68 },
      { x: 60, y: 78 },
      { x: 40, y: 82 },
      { x: 24, y: 56 }
    ];

    const links = [
      [0, 1],
      [1, 2],
      [1, 3],
      [3, 4],
      [4, 5],
      [4, 6],
      [6, 7],
      [7, 8],
      [2, 8],
      [2, 9],
      [9, 3]
    ];

    nodes.forEach((n) => {
      const el = document.createElement("div");
      el.className = "node";
      el.style.left = n.x + "%";
      el.style.top = n.y + "%";
      layer.appendChild(el);
    });

    links.forEach(([a, b]) => {
      const n1 = nodes[a];
      const n2 = nodes[b];

      const dx = n2.x - n1.x;
      const dy = n2.y - n1.y;
      const length = Math.sqrt(dx * dx + dy * dy);

      const angle = Math.atan2(dy, dx) * (180 / Math.PI);

      const link = document.createElement("div");
      link.className = "link";
      link.style.left = n1.x + "%";
      link.style.top = n1.y + "%";
      link.style.width = length + "%";
      link.style.transform = `rotate(${angle}deg)`;
      layer.appendChild(link);
    });
  </script>
</body>
</html>
