<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>node91</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      font-family: "Segoe UI", sans-serif;
      color: #e5e7eb;
      padding: 24px;
    }

    .page-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
    }

    .status-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow:
        0 0 10px rgba(34, 197, 94, 0.9),
        0 0 20px rgba(34, 197, 94, 0.5);
      position: relative;
    }

    .status-dot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(34, 197, 94, 0.6);
    }

    .status-text {
      font-size: 16px;
      letter-spacing: 0.12em;
      margin-top: -2px;
    }

    .message-wrapper {
      padding: 28px 32px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message-title {
      font-size: 22px;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .message-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-form input,
    .message-form textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(30, 41, 59, 0.9);
      color: #e5e7eb;
      font-size: 16px;
    }

    .message-form textarea {
      height: 130px;
      resize: vertical;
    }

    .message-form button {
      padding: 14px 16px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-size: 16px;
    }

    .message-form button:hover {
      background: #16a34a;
    }

    .message-note {
      font-size: 14px;
      opacity: 0.7;
      text-align: center;
    }

    .message-success {
      color: #22c55e;
      font-size: 16px;
      text-align: center;
      margin-bottom: -8px;
    }

    .message-error {
      color: #ef4444;
      font-size: 16px;
      text-align: center;
      margin-bottom: -8px;
    }

    @media (max-width: 480px) {
      .page-stack {
        gap: 32px;
      }

      .message-wrapper {
        padding: 24px;
        gap: 18px;
      }

      .message-title {
        font-size: 20px;
      }

      .message-form input,
      .message-form textarea {
        font-size: 17px;
        padding: 16px;
      }

      .message-form button {
        font-size: 17px;
        padding: 16px;
      }

      .status-wrapper {
        padding: 14px 20px;
      }

      .status-text {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="page-stack">

    <div class="status-wrapper">
      <div class="status-dot"></div>
      <span class="status-text">online</span>
    </div>

    <div class="message-wrapper">
      <h2 class="message-title">Leave your message</h2>

      <div data-fs-success class="message-success"></div>
      <div data-fs-error class="message-error"></div>

      <form id="message-form" class="message-form">
        <input type="text" name="name" placeholder="Your name" required data-fs-field />
        <span data-fs-error="name"></span>

        <textarea name="message" placeholder="Write something..." required data-fs-field></textarea>
        <span data-fs-error="message"></span>

        <button type="submit" data-fs-submit-btn>OK</button>
      </form>

      <p class="message-note">Your message will be delivered privately.</p>
    </div>

  </div>

  <script>
    window.formspree = window.formspree || function () {
      (formspree.q = formspree.q || []).push(arguments);
    };
    formspree('initForm', {
      formElement: '#message-form',
      formId: 'xqerkykp'
    });
  </script>
  <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
