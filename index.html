<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>node91</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      font-family: 
        "Segoe UI", sans-serif;
      color: #e5e7eb;
    }

    .status-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow:
        0 0 8px rgba(34, 197, 94, 0.9),
        0 0 16px rgba(34, 197, 94, 0.5);
      position: relative;
    }

    .status-dot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(34, 197, 94, 0.6);
    }

    .status-text {
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-top: -2px;
    }
  </style>
</head>
<body>
  <div class="status-wrapper">
    <div class="status-dot"></div>
    <span class="status-text">online</span>
  </div>
</body>
</html>
